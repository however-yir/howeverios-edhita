name: iOS CI

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project Edhita.xcodeproj \
            -scheme Edhita \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
