name: iOS CI

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: howeverios-edhita-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_PATH: Edhita.xcodeproj
  SCHEME: Edhita
  DESTINATION: platform=iOS Simulator,name=iPhone 15

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

  unit-tests:
    runs-on: macos-latest
    needs: build
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run EdhitaTests
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/EdhitaTests.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:EdhitaTests \
            test

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-xcresult
          path: build/EdhitaTests.xcresult
          if-no-files-found: warn

  ui-smoke-tests:
    runs-on: macos-latest
    needs: unit-tests
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run EdhitaUITests smoke
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/EdhitaUITests.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:EdhitaUITests/EdhitaUITests/testLaunchEditAndShareSmoke \
            test

      - name: Upload UI Smoke Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-tests-xcresult
          path: build/EdhitaUITests.xcresult
          if-no-files-found: warn
