name: iOS CI

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project Edhita.xcodeproj \
            -scheme Edhita \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

  unit-tests:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run EdhitaTests
        run: |
          xcodebuild \
            -project Edhita.xcodeproj \
            -scheme Edhita \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:EdhitaTests \
            test

  ui-smoke-tests:
    runs-on: macos-latest
    needs: unit-tests
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run EdhitaUITests smoke
        run: |
          xcodebuild \
            -project Edhita.xcodeproj \
            -scheme Edhita \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:EdhitaUITests/EdhitaUITests/testLaunchEditAndShareSmoke \
            test
