name: iOS CI

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: howeverios-edhita-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_PATH: Edhita.xcodeproj
  SCHEME: Edhita
  DESTINATION: platform=iOS Simulator,name=iPhone 15

jobs:
  lint:
    runs-on: macos-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint and SwiftFormat
        run: |
          brew install swiftlint swiftformat

      - name: Run SwiftFormat (lint mode)
        run: swiftformat --lint Edhita EdhitaTests EdhitaUITests

      - name: Run SwiftLint
        run: swiftlint lint --strict

  build:
    runs-on: macos-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate test plan file
        run: test -f Edhita.xctestplan

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

  unit-tests:
    runs-on: macos-latest
    needs: build
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run EdhitaTests
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/EdhitaTests.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:EdhitaTests \
            test

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-xcresult
          path: build/EdhitaTests.xcresult
          if-no-files-found: warn

  ui-smoke-tests:
    runs-on: macos-latest
    needs: unit-tests
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run EdhitaUITests smoke
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/EdhitaUITests.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:EdhitaUITests/EdhitaUITests/testLaunchEditAndShareSmoke \
            test

      - name: Capture Simulator Screenshot On Failure
        if: failure()
        run: |
          mkdir -p build
          xcrun simctl io booted screenshot build/ui-smoke-failure.png || true

      - name: Upload UI Smoke Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-tests-xcresult
          path: build/EdhitaUITests.xcresult
          if-no-files-found: warn

      - name: Upload UI Smoke Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-failure-screenshot
          path: build/ui-smoke-failure.png
          if-no-files-found: ignore
